<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVSound · Склад — что дозаказать</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#0d0f12;
    --bg-soft:#15181d;
    --panel:#1b1f26;
    --panel-2:#222732;
    --line:#2c323d;
    --txt:#e9edf2;
    --muted:#8a93a3;
    --amber:#f5a623;
    --amber-soft:#3a2e16;
    --red:#ff5a5f;
    --red-soft:#3a1c1d;
    --yellow:#ffd24a;
    --green:#36c98e;
    --accent:#f5a623;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, #1a1f29 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #1c1612 0%, transparent 55%),
      var(--bg);
    color:var(--txt);
    font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    font-size:15px; line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:28px 22px 80px}

  /* header */
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:26px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;gap:6px}
  .brand .kicker{font-family:'Inter';font-weight:600;letter-spacing:.22em;text-transform:uppercase;font-size:11px;color:var(--accent)}
  h1{font-family:'Unbounded',sans-serif;font-weight:700;font-size:clamp(26px,4vw,40px);line-height:1.02;letter-spacing:-.01em}
  h1 span{color:var(--muted);font-weight:500}
  .eq{display:flex;align-items:flex-end;gap:3px;height:38px}
  .eq i{width:5px;background:linear-gradient(180deg,var(--amber),#b8741a);border-radius:3px;animation:bounce 1.1s ease-in-out infinite}
  .eq i:nth-child(2){animation-delay:.15s}.eq i:nth-child(3){animation-delay:.3s}
  .eq i:nth-child(4){animation-delay:.45s}.eq i:nth-child(5){animation-delay:.6s}
  @keyframes bounce{0%,100%{height:30%}50%{height:100%}}
  @media (prefers-reduced-motion:reduce){.eq i{animation:none;height:70%}}

  /* dropzone */
  .drop{
    border:1.5px dashed var(--line);border-radius:var(--radius);
    background:var(--bg-soft);
    padding:52px 24px;text-align:center;cursor:pointer;
    transition:border-color .18s, background .18s, transform .18s;
  }
  .drop:hover{border-color:var(--accent);background:#181b21}
  .drop.over{border-color:var(--accent);background:#1d211a;transform:scale(1.005)}
  .drop .ic{font-size:40px;display:block;margin-bottom:12px}
  .drop .big{font-family:'Unbounded';font-weight:500;font-size:19px;margin-bottom:6px}
  .drop .sm{color:var(--muted);font-size:13.5px}
  .drop input{display:none}

  /* controls */
  .controls{display:none;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .controls.show{display:flex}
  .group{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:8px 12px}
  .group label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  .thr-input{width:54px;background:var(--panel-2);border:1px solid var(--line);color:var(--txt);font-size:16px;font-weight:700;
    text-align:center;border-radius:8px;padding:6px 4px;font-family:'Inter'}
  .thr-input:focus{outline:2px solid var(--accent);outline-offset:1px}
  .chips{display:flex;gap:6px}
  .chip{background:var(--panel-2);border:1px solid var(--line);color:var(--muted);font-size:13px;font-weight:600;
    padding:6px 11px;border-radius:8px;cursor:pointer;transition:.15s}
  .chip:hover{color:var(--txt);border-color:#3d4756}
  .chip.active{background:var(--amber);color:#1a1206;border-color:var(--amber)}
  .search,.sel{background:var(--panel-2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 11px;font-size:14px;font-family:'Inter'}
  .search{min-width:180px}
  .search:focus,.sel:focus{outline:2px solid var(--accent);outline-offset:1px}
  .spacer{flex:1}
  .btn{background:var(--panel-2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:9px 14px;
    font-size:14px;font-weight:600;cursor:pointer;transition:.15s;font-family:'Inter';display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:var(--accent);color:#fff}
  .btn.primary{background:var(--amber);color:#1a1206;border-color:var(--amber)}
  .btn.primary:hover{background:#ffb53d}

  /* summary */
  .summary{display:none;gap:12px;flex-wrap:wrap;margin-bottom:20px}
  .summary.show{display:flex}
  .stat{background:linear-gradient(180deg,var(--panel),#171b21);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 20px;min-width:150px;flex:1}
  .stat .n{font-family:'Unbounded';font-weight:700;font-size:28px;line-height:1}
  .stat .l{color:var(--muted);font-size:12.5px;margin-top:7px;text-transform:uppercase;letter-spacing:.06em}
  .stat.red .n{color:var(--red)} .stat.amber .n{color:var(--amber)}

  /* groups + table */
  .groups{display:flex;flex-direction:column;gap:14px}
  .gcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .ghead{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;background:linear-gradient(90deg,#1f242d,transparent)}
  .ghead:hover{background:#212732}
  .ghead .nm{font-family:'Unbounded';font-weight:500;font-size:16px;letter-spacing:.01em}
  .ghead .cnt{background:var(--amber-soft);color:var(--amber);font-size:12.5px;font-weight:700;padding:3px 9px;border-radius:20px}
  .ghead .tag{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.12em}
  .ghead .gsum{margin-left:auto;color:var(--muted);font-size:13px}
  .ghead .arw{color:var(--muted);transition:transform .2s;font-size:12px}
  .gcard.collapsed .arw{transform:rotate(-90deg)}
  .gcard.collapsed .tbl{display:none}
  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    font-weight:600;padding:9px 18px;border-top:1px solid var(--line);background:var(--bg-soft)}
  th.num,td.num{text-align:right}
  tbody td{padding:11px 18px;border-top:1px solid var(--line);font-size:14.5px;vertical-align:middle}
  tbody tr:hover{background:#1e232b}
  .name{font-weight:500}
  .badge{display:inline-flex;align-items:center;justify-content:center;min-width:34px;padding:4px 9px;border-radius:8px;
    font-weight:700;font-size:14px}
  .b0{background:var(--red-soft);color:var(--red)}
  .b1{background:var(--amber-soft);color:var(--amber)}
  .b2{background:#3a3415;color:var(--yellow)}
  .money{color:var(--muted);font-variant-numeric:tabular-nums}

  .empty{display:none;text-align:center;color:var(--muted);padding:48px 20px;font-size:15px}
  .empty.show{display:block}
  .err{display:none;background:var(--red-soft);border:1px solid #5a2a2c;color:#ffb4b6;border-radius:11px;padding:14px 16px;margin-bottom:18px;font-size:14px}
  .err.show{display:block}

  footer{margin-top:40px;color:var(--muted);font-size:12.5px;text-align:center;line-height:1.7}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);
    color:#06281c;font-weight:700;padding:12px 22px;border-radius:11px;opacity:0;pointer-events:none;transition:.25s;font-size:14px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="kicker">AVSound · Склад</span>
      <h1>Что дозаказать <span>· остатки</span></h1>
    </div>
    <div class="eq" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
  </header>

  <div class="err" id="err"></div>

  <label class="drop" id="drop">
    <span class="ic">📦</span>
    <span class="big">Перетащи сюда файл склада <b>.xlsx</b></span>
    <span class="sm">или нажми и выбери файл — данные остаются на этом компьютере, никуда не отправляются</span>
    <input type="file" id="file" accept=".xlsx,.xls">
  </label>

  <div class="controls" id="controls">
    <div class="group">
      <label for="thr">Остаток ≤</label>
      <input class="thr-input" id="thr" type="number" min="0" value="1">
    </div>
    <div class="chips" id="chips">
      <button class="chip" data-v="0">нет (0)</button>
      <button class="chip active" data-v="1">≤ 1</button>
      <button class="chip" data-v="2">≤ 2</button>
      <button class="chip" data-v="3">≤ 3</button>
    </div>
    <input class="search" id="search" type="search" placeholder="Поиск по названию…">
    <select class="sel" id="brandSel"><option value="">Все бренды</option></select>
    <div class="spacer"></div>
    <button class="btn" id="reload">↺ Другой файл</button>
    <button class="btn" id="copy">📋 Копировать список</button>
    <button class="btn primary" id="download">⬇ Скачать .xlsx</button>
  </div>

  <div class="summary" id="summary"></div>
  <div class="empty" id="empty">Ничего с таким остатком не нашлось 👍 Подними порог, чтобы увидеть больше.</div>
  <div class="groups" id="groups"></div>

  <footer>
    AVSound · инструмент склада. Файл обрабатывается локально в браузере.<br>
    Колонки берутся автоматически: <b>название</b>, <b>количество</b>, <b>закуп</b>. Бренд = строка-секция в файле.
  </footer>
</div>
<div class="toast" id="toast">Скопировано</div>

<script>
"use strict";

let ROWS = [];      // {brand, name, qty, zakup, price, cat}
let threshold = 1;

const $ = id => document.getElementById(id);
const drop = $('drop'), fileInput = $('file');

// ---------- file loading ----------
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', e => { const f = e.dataTransfer.files[0]; if (f) handleFile(f); });

function showErr(msg){ const el=$('err'); el.textContent='⚠ '+msg; el.classList.add('show'); }
function clearErr(){ $('err').classList.remove('show'); }

function handleFile(file){
  clearErr();
  if (typeof XLSX === 'undefined'){ showErr('Не загрузился модуль чтения Excel (xlsx.full.min.js). Проверь, что файл лежит рядом с index.html.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const grid = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:null});
      parseGrid(grid);
    }catch(err){ showErr('Не смог прочитать файл: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}

// ---------- parsing ----------
const norm = s => String(s==null?'':s).toLowerCase().replace(/\s+/g,' ').trim();
function toNum(v){
  if (v==null) return null;
  if (typeof v==='number') return v;
  const n = parseFloat(String(v).replace(/[^\d.,-]/g,'').replace(',','.'));
  return isNaN(n)?null:n;
}

function parseGrid(grid){
  // 1. find header row (contains "название" + "количество"/"остаток")
  let hr=-1, map={};
  for (let r=0; r<Math.min(grid.length,15); r++){
    const row=(grid[r]||[]).map(norm);
    const iName=row.findIndex(c=>c==='название'||c==='наименование'||c==='товар');
    const iQty =row.findIndex(c=>c==='количество'||c==='кол-во'||c==='остаток'||c==='кол');
    if (iName>=0 && iQty>=0){
      hr=r;
      map.name=iName; map.qty=iQty;
      map.zakup=row.findIndex(c=>c==='закуп'||c==='закупка'||c==='закупочная');
      map.price=row.findIndex(c=>c==='стоимость'||c==='цена'||c==='розница');
      map.cat  =row.findIndex(c=>c==='категория'||c==='goodstype'||c==='тип');
      break;
    }
  }
  // fallback to known layout of AVSound file (E/G/H)
  if (hr<0){ hr=1; map={name:4,qty:6,zakup:7,price:5,cat:3}; }

  ROWS=[]; let brand='Без бренда';
  for (let r=hr+1; r<grid.length; r++){
    const row=grid[r]||[];
    const name=row[map.name];
    const qtyRaw=row[map.qty];
    // brand section row: no name, no qty, but first cell has text
    const firstCell=row.find(c=>c!=null&&String(c).trim()!=='');
    if ((name==null||String(name).trim()==='') && (qtyRaw==null||String(qtyRaw).trim()==='')){
      if (firstCell && String(firstCell).trim().length<=40) brand=String(firstCell).trim();
      continue;
    }
    if (name==null||String(name).trim()==='') continue;
    const qty=toNum(qtyRaw);
    if (qty==null) continue;
    ROWS.push({
      brand, name:String(name).trim(), qty,
      zakup: map.zakup>=0?toNum(row[map.zakup]):null,
      price: map.price>=0?toNum(row[map.price]):null,
      cat:   map.cat>=0?(row[map.cat]!=null?String(row[map.cat]).trim():''):''
    });
  }

  if (!ROWS.length){ showErr('В файле не нашлись товары. Проверь, что есть колонки «название» и «количество».'); return; }

  // populate brand filter
  const brands=[...new Set(ROWS.map(r=>r.brand))].sort((a,b)=>a.localeCompare(b,'ru'));
  const sel=$('brandSel'); sel.innerHTML='<option value="">Все бренды</option>'+brands.map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join('');

  drop.style.display='none';
  $('controls').classList.add('show');
  render();
}

// ---------- rendering ----------
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmt(n){ return n==null?'—':Math.round(n).toLocaleString('ru-RU'); }
function qtyLabel(q){ return q===0?'нет':(q+' шт'); }

function filtered(){
  const q=norm($('search').value), bf=$('brandSel').value;
  return ROWS.filter(r=> r.qty<=threshold && (!bf||r.brand===bf) && (!q||norm(r.name).includes(q)) );
}

function render(){
  const list=filtered();
  // summary
  const total=list.length;
  const zero=list.filter(r=>r.qty===0).length;
  const sumZakup=list.reduce((s,r)=>s+(r.zakup||0),0);
  const sm=$('summary');
  sm.classList.add('show');
  sm.innerHTML=`
    <div class="stat amber"><div class="n">${total}</div><div class="l">позиций дозаказать</div></div>
    <div class="stat red"><div class="n">${zero}</div><div class="l">совсем нет (0)</div></div>
    <div class="stat"><div class="n">${fmt(sumZakup)} ₽</div><div class="l">закуп на 1 шт каждой</div></div>
    <div class="stat"><div class="n">${new Set(list.map(r=>r.brand)).size}</div><div class="l">поставщиков</div></div>`;

  const groups=$('groups');
  if (!total){ $('empty').classList.add('show'); groups.innerHTML=''; return; }
  $('empty').classList.remove('show');

  // group by brand
  const byBrand={};
  list.forEach(r=>{ (byBrand[r.brand]=byBrand[r.brand]||[]).push(r); });
  const names=Object.keys(byBrand).sort((a,b)=>byBrand[b].length-byBrand[a].length);

  groups.innerHTML=names.map(b=>{
    const items=byBrand[b].sort((x,y)=>x.qty-y.qty);
    const gsum=items.reduce((s,r)=>s+(r.zakup||0),0);
    const rows=items.map(r=>{
      const bcls=r.qty===0?'b0':(r.qty===1?'b1':'b2');
      return `<tr>
        <td class="name">${esc(r.name)}</td>
        <td class="num"><span class="badge ${bcls}">${qtyLabel(r.qty)}</span></td>
        <td class="num money">${fmt(r.zakup)}</td>
        <td class="num money">${fmt(r.price)}</td>
      </tr>`;
    }).join('');
    return `<div class="gcard">
      <div class="ghead" onclick="this.parentNode.classList.toggle('collapsed')">
        <span class="nm">${esc(b)}</span>
        <span class="cnt">${items.length}</span>
        <span class="tag">поставщик</span>
        <span class="gsum">закуп ~${fmt(gsum)} ₽</span>
        <span class="arw">▼</span>
      </div>
      <table class="tbl">
        <thead><tr><th>Название</th><th class="num">Остаток</th><th class="num">Закуп ₽</th><th class="num">Розница ₽</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');
}

// ---------- controls ----------
function setThreshold(v){
  threshold=Math.max(0,parseInt(v)||0);
  $('thr').value=threshold;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',+c.dataset.v===threshold));
  render();
}
$('thr').addEventListener('input',e=>setThreshold(e.target.value));
$('chips').addEventListener('click',e=>{ const c=e.target.closest('.chip'); if(c) setThreshold(c.dataset.v); });
$('search').addEventListener('input',render);
$('brandSel').addEventListener('change',render);
$('reload').addEventListener('click',()=>location.reload());

// copy list as text for supplier
$('copy').addEventListener('click',()=>{
  const list=filtered();
  if(!list.length){ toast('Список пуст'); return; }
  const byBrand={}; list.forEach(r=>{(byBrand[r.brand]=byBrand[r.brand]||[]).push(r);});
  let out=`Дозаказ (остаток ≤ ${threshold}) — ${new Date().toLocaleDateString('ru-RU')}\n`;
  Object.keys(byBrand).sort().forEach(b=>{
    out+=`\n${b}:\n`;
    byBrand[b].sort((x,y)=>x.qty-y.qty).forEach(r=>{ out+=`• ${r.name} — ${qtyLabel(r.qty)}\n`; });
  });
  navigator.clipboard.writeText(out).then(()=>toast('Список скопирован')).catch(()=>{
    // fallback
    const ta=document.createElement('textarea'); ta.value=out; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove(); toast('Список скопирован');
  });
});

// download filtered as xlsx
$('download').addEventListener('click',()=>{
  const list=filtered();
  if(!list.length){ toast('Список пуст'); return; }
  const data=[['Бренд','Название','Остаток','Закуп','Розница']];
  list.sort((a,b)=> a.brand.localeCompare(b.brand,'ru')||a.qty-b.qty)
      .forEach(r=>data.push([r.brand,r.name,r.qty,r.zakup,r.price]));
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:16},{wch:48},{wch:10},{wch:10},{wch:10}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Дозаказ');
  XLSX.writeFile(wb,`дозаказ_остаток_${threshold}.xlsx`);
});

let toastT;
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1800); }
</script>
</body>
</html>
